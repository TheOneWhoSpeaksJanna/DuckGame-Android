name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install .NET 8 SDK (latest 8.0.x — ships Microsoft.NETCore.App.Ref 8.0.28,
          matching the Android workload's Mono runtime CoreLib 8.0.28; using the
          runner's older pre-installed SDK would bundle a mismatched 8.0.2 CoreLib
          and Mono aborts on System.Private.CoreLib load)
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 8.0 --install-dir $HOME/.dotnet8
          echo "$HOME/.dotnet8" >> "$GITHUB_PATH"
          "$HOME/.dotnet8/dotnet" --version

      - name: Install Android workload
        run: dotnet workload install android

      - name: Install Android SDK + NDK + build tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Install ninja + cmake
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake

      - name: Build FNA native libs for Android (arm64-v8a)
        run: bash build-android-libs.sh "$PWD/DuckGame/libs/arm64-v8a"

      - name: Restore
        run: dotnet restore DuckGame/DuckGame.Android.csproj

      - name: Build release APK
        run: |
          dotnet build DuckGame/DuckGame.Android.csproj \
            -c Release -f net8.0-android \
            -p:AndroidSdkDirectory=$ANDROID_HOME \
            -p:AndroidNdkDirectory=$ANDROID_NDK_HOME

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuckGame-android-apk
          path: "DuckGame/bin/Release/net8.0-android/*-Signed.apk"
          if-no-files-found: warn

      - name: Create GitHub Release (stable download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Duck Game Android build #${{ github.run_number }}
          body: |
            Automated Android build of Duck Game (arm64-v8a, Release).
            Install the APK below on your phone; it runs fullscreen and ignores the notch.
          files: "DuckGame/bin/Release/net8.0-android/*-Signed.apk"
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
